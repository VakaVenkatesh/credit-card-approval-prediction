<!-- templates/base.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Credit Risk Desk{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-brand">
        <span class="nav-mark">CRD</span>
        <span class="nav-name">Credit Risk Desk</span>
      </div>
      <div class="nav-links">
        <a href="{{ url_for('home') }}">Overview</a>
        <a href="{{ url_for('predict_form') }}">New Application</a>
      </div>
    </nav>
    <main class="content">{% block content %}{% endblock %}</main>
    <footer class="footer">
      <span>Rule engine + XGBoost risk model &middot; triage tool, not an automatic decision system</span>
    </footer>
  </body>
</html>
